<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>Fashion Store | Modern Clothing & Accessories</title>

  <meta
    name="description"
    content="Discover the latest fashion trends, premium clothing, shoes, and accessories. Shop high-quality men's and women's fashion with fast delivery."
  />

  <meta
    name="keywords"
    content="fashion, clothing, men's clothing, women's clothing, t-shirts, hoodies, jeans, shoes, accessories, online shopping"
  />

  <meta name="author" content="Fashion Store" />
  <meta name="robots" content="index, follow" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#111827" />

  <!-- Open Graph -->
  <meta property="og:title" content="Fashion Store | Modern Clothing" />
  <meta
    property="og:description"
    content="Shop the newest fashion collections with premium quality and fast delivery."
  />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://your-domain.com" />
  <meta property="og:image" content="/og-image.png" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta
    name="twitter:title"
    content="Fashion Store | Modern Clothing"
  />
  <meta
    name="twitter:description"
    content="Discover premium fashion and shop the latest collections online."
  />
  <meta name="twitter:image" content="/og-image.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
